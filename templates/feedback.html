{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border border-stone-100 my-8">
    <h2 class="text-2xl font-serif font-bold text-stone-900 mb-2">Share Your Experience</h2>
    <p class="text-stone-500 text-sm mb-6">Help us refine our dishes by submitting your precious feedback.</p>

    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-stone-700 mb-1">Registered Phone No</label>
            <input type="text" name="phone" placeholder="Enter your contact number" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-600">
        </div>
        <div>
            <label class="block text-sm font-semibold text-stone-700 mb-1">Your Comments</label>
            <textarea name="comments" rows="4" placeholder="How was the taste? Write a review..." required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-600"></textarea>
        </div>
        <button type="submit" class="w-full bg-stone-800 text-white font-medium py-2.5 rounded-lg hover:bg-stone-900 transition">
            Submit Review
        </button>
    </form>
</div>
{% endblock %}
