{% extends 'base.html' %}
{% block content %}
<div class="max-w-sm mx-auto bg-white p-8 rounded-xl shadow-sm border border-stone-100 my-12">
    <div class="text-center mb-6">
        <span class="text-3xl block mb-2"></span>
        <h2 class="text-2xl font-serif font-bold text-stone-900">Login as Manager</h2>
        <p class="text-stone-500 text-sm">Authorized restaurant administration access only</p>
    </div>

    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-stone-700 mb-1">Username</label>
            <input type="text" name="username" placeholder="e.g. admin" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-600">
        </div>
        <div>
            <label class="block text-sm font-semibold text-stone-700 mb-1">Security Key</label>
            <input type="password" name="password" placeholder="••••••••" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-600">
        </div>
        <button type="submit" class="w-full bg-amber-950 text-white font-medium py-2.5 rounded-lg hover:bg-amber-900 transition pt-2">
            Authenticate Panel
        </button>
    </form>
</div>
{% endblock %}
