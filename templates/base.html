<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Miami | Culinary Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-stone-800 flex flex-col min-h-screen">

    <nav class="bg-slate-950 text-slate-100 shadow-lg border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-xl font-mono tracking-widest font-black text-amber-400 flex items-center gap-2">
                HOTEL MIAMI
            </a>
            <div class="space-x-8 text-sm font-medium tracking-wide">
                <a href="/" class="hover:text-amber-400 transition duration-200">HOME</a>
                <a href="/menu" class="hover:text-amber-400 transition duration-200">EXPLORE MENU</a>
                <a href="/admin/login" class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold px-4 py-2 rounded transition duration-200 shadow-md">MANAGER PORTAL</a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto w-full px-6 mt-6">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="p-4 rounded-lg text-sm text-center font-semibold tracking-wide shadow-sm {% if category == 'success' %} bg-emerald-600 text-white {% else %} bg-amber-500 text-slate-950 {% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <main class="flex-grow max-w-6xl mx-auto w-full px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="py-6 bg-stone-50"></footer>

</body>
</html>
