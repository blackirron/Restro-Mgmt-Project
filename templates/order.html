{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border border-stone-100 my-8">
    <h2 class="text-2xl font-serif font-bold text-stone-900 mb-2">Confirm Your Order</h2>
    <p class="text-stone-500 text-sm mb-6">Review your selection and enter your delivery details below.</p>
    
    <div class="bg-stone-50 p-4 rounded-lg mb-6 border border-stone-100">
        <span class="text-xs font-bold text-amber-700 uppercase tracking-wide block mb-1">{{ item.Category }}</span>
        <div class="flex justify-between items-center">
            <span class="font-serif font-semibold text-stone-800">{{ item.Name }}</span>
            <span class="font-bold text-stone-900">₹{{ "%.2f"|format(item.Price) }}</span>
        </div>
    </div>

    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-stone-700 mb-1">Quantity</label>
            <input type="number" name="quantity" min="1" value="1" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-600">
        </div>
        <div>
            <label class="block text-sm font-semibold text-stone-700 mb-1">Phone Number</label>
            <input type="text" name="phone" placeholder="e.g. 9876543210" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-600">
        </div>
        <div>
            <label class="block text-sm font-semibold text-stone-700 mb-1">Delivery Address</label>
            <textarea name="address" rows="3" placeholder="Complete Street Name, Apartment, Zip Code" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-600"></textarea>
        </div>
        <button type="submit" class="w-full bg-amber-800 text-white font-medium py-2.5 rounded-lg hover:bg-amber-900 transition mt-2">
            Confirm Order
        </button>
    </form>
</div>
{% endblock %}
